    <script>
      (function () {
        try {
          var stored = localStorage.getItem('theme-preference');
          var theme = stored ? JSON.parse(stored).state.theme : 'dark';
          if (theme === 'dark') document.documentElement.classList.add('dark');
        } catch (_) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
